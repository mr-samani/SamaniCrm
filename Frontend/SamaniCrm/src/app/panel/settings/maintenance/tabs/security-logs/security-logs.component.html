<form [formGroup]="form">
  <div class="input-search">
    <input
      class="form-control"
      type="text"
      maxlength="500"
      formControlName="filter"
      [placeholder]="'SearchWithThreeDot' | translate" />
    <button class="input-group-text btn btn-primary" (click)="reload()" type="submit">
      <i class="fa fa-search mx-1"></i>
    </button>
    <button class="btn btn-primary" (click)="showFilter = !showFilter">
      <i class="fa fa-filter-list mx-1"></i>
      <span>{{ 'Filter' | translate }}</span>
    </button>
  </div>
  <div *filterForm="showFilter" class="filter-form">
    <div class="row">
      @if (isHost) {
        <auto-complete-tenant class="col-sm-6 col-md-4" formControlName="tenant"></auto-complete-tenant>
      }

      <mat-form-field class="col-sm-6 col-md-4">
        <mat-label>{{ 'Severity' | translate }}</mat-label>
        <mat-select formControlName="severity">
          @for (item of LogLevel | enumToArray; track $index) {
            <mat-option [value]="+item">{{ 'LogLevel_' + item | translate }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field class="col-sm-6 col-md-4">
        <mat-label>{{ 'EventType' | translate }}</mat-label>
        <mat-select formControlName="eventType">
          @for (item of SecurityEventType | enumToArray; track $index) {
            <mat-option [value]="+item">{{ 'SecurityEventType_' + item | translate }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>
    <div class="d-flex align-items-center justify-content-end gap-2">
      <button class="btn btn-primary" (click)="resetFilter()" type="reset">
        <i class="fa fa-times mx-1"></i>
        <span>{{ 'Reset' | translate }}</span>
      </button>
      <button class="btn btn-primary" (click)="reload()" type="submit">
        <i class="fa fa-refresh mx-1"></i>
        <span>{{ 'Reload' | translate }}</span>
      </button>
    </div>
  </div>
</form>

<table-view [list]="items" [fields]="fields" [loading]="loading" (sortChange)="getList($event)"></table-view>

<pagination [total]="totalCount" [(page)]="page" (onChange)="onPageChange($event)"></pagination>
