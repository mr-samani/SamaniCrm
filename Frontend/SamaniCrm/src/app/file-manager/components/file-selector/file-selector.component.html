<button mat-raised-button color="primary" type="button" (click)="openFileManager()">
  {{ 'SelectFile' | translate }}
</button>

@if (fileInfo && _options.showPreview) {
  <div class="file-preview">
    <div class="image-container">
      @if (fileInfo.id) {
        <img [src]="fileServerUrl + '/' + fileInfo.id" [alt]="fileInfo.extension" />
      } @else {
        <img src="/images/default-image.png" />
      }
    </div>
    <div class="name">
      {{ fileInfo.name }}
    </div>
  </div>
}
