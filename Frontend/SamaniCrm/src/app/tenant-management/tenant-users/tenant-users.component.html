<h2 mat-dialog-title cdkDrag cdkDragRootElement=".cdk-overlay-pane">
  <span cdkDragHandle class="title">{{ 'TenantUsers' | translate }}</span>

  <button type="button" class="close-btn" aria-label="Close" mat-dialog-close mat-icon-button>
    <span aria-hidden="true">&times;</span>
  </button>
</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <div class="input-search">
      <input
        class="form-control"
        type="text"
        maxlength="500"
        formControlName="filter"
        [placeholder]="'SearchWithThreeDot' | translate" />
      <button class="input-group-text btn btn-primary" (click)="reload()" type="submit">
        <i class="fa fa-search mx-1"></i>
      </button>
      <button class="btn btn-primary" (click)="showFilter = !showFilter">
        <i class="fa fa-filter-list mx-1"></i>
        <span>{{ 'Filter' | translate }}</span>
      </button>
    </div>
    <div *filterForm="showFilter" class="filter-form">
      <div class="row"></div>
      <div class="d-flex align-items-center justify-content-end gap-2">
        <button class="btn btn-primary" (click)="resetFilter()" type="reset">
          <i class="fa fa-times mx-1"></i>
          <span>{{ 'Reset' | translate }}</span>
        </button>
        <button class="btn btn-primary" (click)="reload()" type="submit">
          <i class="fa fa-refresh mx-1"></i>
          <span>{{ 'Reload' | translate }}</span>
        </button>
      </div>
    </div>
  </form>

  <table-view
    [list]="list"
    [fields]="fields"
    [operations]="operations"
    [loading]="loading"
    (sortChange)="getList($event)"></table-view>

  <pagination [total]="totalCount" [(page)]="page" (onChange)="onPageChange($event)"></pagination>

  <ng-template #operations let-item>
    @if ([AppPermissions.TenantManagement_DelegateUser] | permissionAny) {
      <button mat-icon-button [matMenuTriggerFor]="menu" #menuTrigger="matMenuTrigger">
        <i class="fa fa-ellipsis-v"></i>
      </button>
      <mat-menu #menu="matMenu">
        @if (AppPermissions.TenantManagement_DelegateUser | permission) {
          <a mat-menu-item (click)="delegateUser(item)">
            <i class="fa fa-person-through-window mx-1"></i>
            <span>{{ 'DelegateUser' | translate }}</span>
          </a>
        }
      </mat-menu>
    }
  </ng-template>
</mat-dialog-content>
<mat-dialog-actions>
  <button class="btn btn-default" mat-dialog-close>{{ 'Close' | translate }}</button>
</mat-dialog-actions>
